name: AI SQL Reviewer

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  review:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python auto_pr_review.py